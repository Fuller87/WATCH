<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Hintergrund -->
  <rect width="512" height="512" rx="80" fill="#111526"/>
  <!-- Äußerer Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#e11d1d" stroke-width="12"/>
  <!-- Innerer Ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="rgba(225,29,29,0.35)" stroke-width="4"/>
  <!-- W -->
  <text x="256" y="310"
    font-family="system-ui, Arial Black, sans-serif"
    font-size="200"
    font-weight="900"
    fill="#d4a820"
    text-anchor="middle"
    letter-spacing="-8"
    filter="url(#glow)">W</text>
  <!-- Goldener Akzent-Strich unten -->
  <rect x="156" y="338" width="200" height="6" rx="3" fill="#d4a820" opacity="0.7"/>
  <!-- Glüh-Filter -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
